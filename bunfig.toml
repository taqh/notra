[install]
# Only install package versions published at least 7 days ago
minimumReleaseAge = 604800
# Temporary: unblock reviewed packages that are younger than minimumReleaseAge.
minimumReleaseAgeExcludes = [
  "@dualmark/converters",
  "@dualmark/core",
  "@dualmark/nextjs",
  "knip",
  "next",
  "react",
  "react-dom",
]
